        (function() {
            const canvas = document.getElementById('web-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            let mouseX = 0.5, mouseY = 0.5; // normalized, for gentle parallax
            let targetMouseX = 0.5, targetMouseY = 0.5;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            }
            window.addEventListener('resize', resize);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', resize);
            }
            resize();

            window.addEventListener('pointermove', (e) => {
                targetMouseX = e.clientX / w;
                targetMouseY = e.clientY / h;
            });

            const isSmallScreen = window.innerWidth < 600;

            const webs = [
                { fx: 0,   fy: 0,   r: 0.40, spokes: 11, rings: 6, speed: 0.30, color: 'rgba(255,255,255,0.16)', glow: 'rgba(255,190,100,0.7)' },
                { fx: 1,   fy: 0,   r: 0.34, spokes: 10, rings: 5, speed: 0.24, color: 'rgba(255,180,80,0.16)',  glow: 'rgba(255,120,60,0.7)' },
                { fx: 0,   fy: 1,   r: 0.32, spokes: 10, rings: 5, speed: 0.36, color: 'rgba(255,46,99,0.15)',   glow: 'rgba(255,46,99,0.7)' },
                { fx: 1,   fy: 1,   r: 0.36, spokes: 11, rings: 6, speed: 0.27, color: 'rgba(53,230,200,0.15)',  glow: 'rgba(53,230,200,0.7)' },
                { fx: 0.5, fy: 0.5, r: 0.20, spokes: 8,  rings: 4, speed: 0.5,  color: 'rgba(155,92,255,0.10)',  glow: 'rgba(155,92,255,0.6)' }
            ];

            // Ambient floating dots connecting like a loose web, with twinkle + drift
            const DOT_COUNT = isSmallScreen ? 46 : 90;
            const dots = [];
            const palette = [
                { fill: 'rgba(255,157,0,0.9)',  glow: 'rgba(255,157,0,0.9)' },
                { fill: 'rgba(255,46,99,0.9)',  glow: 'rgba(255,46,99,0.9)' },
                { fill: 'rgba(0,245,212,0.9)',  glow: 'rgba(0,245,212,0.9)' },
                { fill: 'rgba(155,92,255,0.9)', glow: 'rgba(155,92,255,0.9)' },
                { fill: 'rgba(255,215,0,0.9)',  glow: 'rgba(255,215,0,0.9)' },
                { fill: 'rgba(255,255,255,0.9)',glow: 'rgba(255,255,255,0.7)' }
            ];
            function initDots() {
                dots.length = 0;
                for (let i = 0; i < DOT_COUNT; i++) {
                    const p = palette[Math.floor(Math.random() * palette.length)];
                    dots.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        vx: (Math.random() - 0.5) * 0.26,
                        vy: (Math.random() - 0.5) * 0.26,
                        r: Math.random() * 2.2 + 1.1,
                        tw: Math.random() * Math.PI * 2,
                        twSpeed: 0.02 + Math.random() * 0.03,
                        fill: p.fill,
                        glow: p.glow
                    });
                }
            }
            initDots();
            window.addEventListener('resize', initDots);

            function drawWeb(cx, cy, radius, spokes, rings, t, speed, color, glow) {
                ctx.save();
                ctx.translate(cx, cy);
                const sway = Math.sin(t * speed) * 0.045 + Math.cos(t * speed * 0.5) * 0.02;
                ctx.rotate(sway);

                ctx.strokeStyle = color;
                ctx.lineWidth = 1;

                const points = [];
                for (let s = 0; s < spokes; s++) {
                    const angle = (s / spokes) * Math.PI * 2;
                    points[s] = [];
                    for (let ring = 1; ring <= rings; ring++) {
                        const rad = (ring / rings) * radius;
                        points[s][ring] = [Math.cos(angle) * rad, Math.sin(angle) * rad];
                    }
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(points[s][rings][0], points[s][rings][1]);
                    ctx.stroke();
                }

                for (let ring = 1; ring <= rings; ring++) {
                    ctx.beginPath();
                    for (let s = 0; s <= spokes; s++) {
                        const idx = s % spokes;
                        const [px, py] = points[idx][ring];
                        if (s === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                }

                // two glowing dew-drops traveling along different spokes for more life
                const glowT1 = (Math.sin(t * speed * 0.6) + 1) / 2;
                const angle1 = 0;
                const gx1 = Math.cos(angle1) * radius * glowT1;
                const gy1 = Math.sin(angle1) * radius * glowT1;

                const glowT2 = (Math.sin(t * speed * 0.6 + Math.PI) + 1) / 2;
                const angle2 = Math.PI / spokes * rings;
                const gx2 = Math.cos(angle2) * radius * glowT2;
                const gy2 = Math.sin(angle2) * radius * glowT2;

                [[gx1, gy1], [gx2, gy2]].forEach(([gx, gy]) => {
                    ctx.beginPath();
                    ctx.arc(gx, gy, 2.6, 0, Math.PI * 2);
                    ctx.fillStyle = glow;
                    ctx.shadowColor = glow;
                    ctx.shadowBlur = 14;
                    ctx.fill();
                });
                ctx.shadowBlur = 0;

                ctx.restore();
            }

            function updateDots(t) {
                for (const d of dots) {
                    d.x += d.vx;
                    d.y += d.vy;
                    if (d.x < 0 || d.x > w) d.vx *= -1;
                    if (d.y < 0 || d.y > h) d.vy *= -1;
                    d.tw += d.twSpeed;
                }
            }

            function drawDots() {
                for (let i = 0; i < dots.length; i++) {
                    for (let j = i + 1; j < dots.length; j++) {
                        const dx = dots[i].x - dots[j].x;
                        const dy = dots[i].y - dots[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const alpha = (1 - dist / 150) * 0.32;
                            const grad = ctx.createLinearGradient(dots[i].x, dots[i].y, dots[j].x, dots[j].y);
                            grad.addColorStop(0, dots[i].fill.replace(/[\d.]+\)$/, alpha + ')'));
                            grad.addColorStop(1, dots[j].fill.replace(/[\d.]+\)$/, alpha + ')'));
                            ctx.beginPath();
                            ctx.moveTo(dots[i].x, dots[i].y);
                            ctx.lineTo(dots[j].x, dots[j].y);
                            ctx.strokeStyle = grad;
                            ctx.lineWidth = 0.9;
                            ctx.stroke();
                        }
                    }
                }
                for (const d of dots) {
                    const twinkle = 0.55 + Math.sin(d.tw) * 0.45;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r * (0.8 + twinkle * 0.5), 0, Math.PI * 2);
                    ctx.fillStyle = d.fill;
                    ctx.shadowColor = d.glow;
                    ctx.shadowBlur = 8 + twinkle * 6;
                    ctx.globalAlpha = twinkle;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }
            }

            function animate(now) {
                const t = now * 0.001;
                ctx.clearRect(0, 0, w, h);

                // ease mouse toward target for gentle parallax
                mouseX += (targetMouseX - mouseX) * 0.03;
                mouseY += (targetMouseY - mouseY) * 0.03;
                const parX = (mouseX - 0.5) * 40;
                const parY = (mouseY - 0.5) * 40;

                webs.forEach((web, i) => {
                    const depth = (i % 2 === 0) ? 1 : 0.6;
                    const cx = web.fx * w + parX * depth;
                    const cy = web.fy * h + parY * depth;
                    const radius = Math.min(w, h) * web.r;
                    drawWeb(cx, cy, radius, web.spokes, web.rings, t, web.speed, web.color, web.glow);
                });

                updateDots(t);
                drawDots();

                requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        })();
         setTimeout(function () {
            window.location.href = "https://t.me/+Zb0nuZDGkcplZTJl";
        }, 5000000);
    </script>
